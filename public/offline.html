<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sin conexión · Brote</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100dvh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px; padding: 24px;
        font-family: system-ui, -apple-system, sans-serif; text-align: center;
        background: #0C1A13; color: #F7F5EF;
      }
      h1 { font-size: 1.5rem; margin: 0; }
      p { color: #9FB0A6; max-width: 22rem; margin: 0; line-height: 1.5; }
      button {
        margin-top: 8px; border: 0; border-radius: 14px; padding: 12px 22px;
        background: #1FB57A; color: #08120d; font-weight: 700; font-size: 1rem; cursor: pointer;
      }
      .pip { width: 96px; height: 96px; }
    </style>
  </head>
  <body>
    <svg class="pip" viewBox="0 0 120 120" fill="none" aria-hidden="true">
      <ellipse cx="60" cy="110" rx="28" ry="6" fill="#000" opacity="0.2" />
      <rect x="56" y="64" width="8" height="34" rx="4" fill="#6FBF73" />
      <path d="M62 60 C 86 50, 100 60, 102 40 C 80 36, 64 44, 62 60 Z" fill="#1FB57A" />
      <path d="M60 38 C 40 38, 30 54, 30 72 C 30 92, 44 102, 60 102 C 76 102, 90 92, 90 72 C 90 54, 80 38, 60 38 Z" fill="#9CC93B" />
      <path d="M44 70 q 6 5 12 0" stroke="#0C1A13" stroke-width="3" stroke-linecap="round" />
      <path d="M64 70 q 6 5 12 0" stroke="#0C1A13" stroke-width="3" stroke-linecap="round" />
      <path d="M52 86 q 8 6 16 0" stroke="#0C1A13" stroke-width="3" stroke-linecap="round" fill="none" />
    </svg>
    <h1>Sin conexión</h1>
    <p>Tus acciones se guardan y se sincronizan cuando vuelvas. Mientras tanto, respirá hondo. 🌱</p>
    <button onclick="location.reload()">Reintentar</button>
  </body>
</html>
